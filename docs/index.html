<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stitch Row - Cross Stitch Log</title>
<style>
  body { margin:0; background:#241A22; color:#F7ECF0; font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; text-align:center; }
  .wrap { max-width: 560px; padding: 48px 24px; }
  h1 { font-size: 2rem; margin-bottom: 8px; color:#D6668F; }
  p { opacity: 0.85; line-height: 1.6; }
  .badge { display:inline-block; margin-top: 24px; padding: 10px 20px; border: 1px solid #D6668F; border-radius: 999px; color:#D6668F; text-decoration:none; }
  footer { margin-top: 40px; font-size: 0.8rem; opacity: 0.5; }
  a { color:#D6668F; }

  @keyframes floatOrb {
    0%, 100% { transform: translate(0,0) scale(1); }
    50% { transform: translate(30px,-40px) scale(1.08); }
  }
  @keyframes fadeUp {
    from { opacity:0; transform: translateY(16px); }
    to { opacity:1; transform: translateY(0); }
  }
  .orb {
    position: fixed; top: -120px; right: -120px; width: 420px; height: 420px;
    background: radial-gradient(circle, #D6668F55 0%, #D6668F00 70%);
    filter: blur(10px); pointer-events: none; z-index: 0;
    animation: floatOrb 9s ease-in-out infinite;
  }
  .wrap { position: relative; z-index: 1; }
  h1 { animation: fadeUp 0.8s ease-out both; }
  p.tagline { animation: fadeUp 0.8s ease-out 0.15s both; }
  .feature { animation: fadeUp 0.8s ease-out both; transition: transform 0.25s ease; }
  .feature:nth-of-type(1) { animation-delay: 0.3s; }
  .feature:nth-of-type(2) { animation-delay: 0.45s; }
  .feature:hover { transform: translateY(-3px); }
  footer { animation: fadeUp 0.8s ease-out 0.6s both; }
</style>
</head>
<body>
<div class="orb"></div>
<div class="wrap">
  <h1>Stitch Row - Cross Stitch Log</h1>
  <p>Track cross stitch project progress by stitch count and floss colors used.</p>
  <a class="badge" href="privacy.html">Privacy</a>
  <a class="badge" href="terms.html">Terms</a>
  <footer>Contact: s0533495227@gmail.com</footer>
</div>
</body>
</html>
