name: StitchRow
options:
  bundleIdPrefix: com.shimondeitel.crossstitchlog
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  StitchRow:
    type: application
    platform: iOS
    sources:
      - path: StitchRow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.crossstitchlog
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: StitchRow/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  StitchRowTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: StitchRowTests
      - path: StitchRow.storekit
    dependencies:
      - target: StitchRow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.crossstitchlog.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  StitchRowUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: StitchRowUITests
    dependencies:
      - target: StitchRow
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.crossstitchlog.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  StitchRow:
    build:
      targets:
        StitchRow: all
        StitchRowTests: [test]
        StitchRowUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: StitchRow.storekit
    test:
      config: Debug
      storeKitConfiguration: StitchRow.storekit
      targets:
        - StitchRowTests
        - StitchRowUITests
    archive:
      config: Release
